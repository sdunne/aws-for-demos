---
- name: Testing AAP and Splunk and EDA for SSMO
  hosts: all
  become: true

  tasks:
    - name: Install firewalld package
      ansible.builtin.dnf:
        name: firewalld
        state: present

    - name: firewalld service enabled and started
      ansible.builtin.service:
        name: firewalld
        enabled: true
        state: started

