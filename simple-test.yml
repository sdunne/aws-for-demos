---
- name: Simple Ansible ping test
  hosts: "{{ _hosts }}"
  gather_facts: false

  vars_files:
    - secrets.yml
  
  tasks:
    - name: Ansible ping
      ansible.builtin.ping:

    - name: Ansible gather facts
      ansible.builtin.setup:
      register: facts

    - name: Show facts
      ansible.builtin.debug:
        var: facts

